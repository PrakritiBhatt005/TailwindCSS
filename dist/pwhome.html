<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>PW Skills Webpage</title>
</head>
<body class="bg-slate-950">
    <!-- navbar starts here -->
    <nav class="w-full h-14 bg-indigo-200 flex justify-between px-4 items-center md:px-4">
        <div class="text-2xl text-indigo-700 font-bold">PW Skills</div>
        <ul class="md:flex hidden font-semibold ">
            <li class="mx-2.5 cursor-pointer">Home</li>
            <li class="mx-2.5 cursor-pointer">About Us</li>
            <li class="mx-2.5 cursor-pointer">Contact Us</li>
        </ul>
        <div class="hidden md:block px-2 py-2 bg-indigo-700 text-white rounded font-bold cursor-pointer">Login/Signup</div>
        <div class="md:hidden">
            <a class="text-4xl" href="#">&#8801;</a>
        </div>
     </nav>
    <!-- navbar ends here -->
    <!-- hero section starts here -->
    <header class="w-full">
        <img class="w-full hidden md:block" src="https://cdn.pwskills.com/assets/uploads/banners/63a18cca807628f5968f528a/web.jpg" alt="">
        <img class="w-full md:hidden" src="https://cdn.pwskills.com/assets/uploads/banners/63a18cca807628f5968f528a/mobile.jpg" alt="">
    </header>
    <!-- hero/image section ends here -->
    <!-- our student section start here -->
    <div class="h-auto w-full flex flex-wrap flex-col items-center text-center p-10">
        <div class="w-full h-auto flex flex-wrap flex-col items-center">
            <p class="text-indigo-800 font-bold text-3xl md:text-4xl text-center">"Pure Hardwork, No Shortcuts!"</p>
            <div class="w-36 h-1 border-b-4 border-amber-400 mt-2 rounded-2xl md:mt-4 mb-12"></div>
        </div>
        <div class="w-full flex flex-wrap justify-evenly">
            <div class="w-46 flex flex-col items-center mb-12">
                <img class="w-44 h-44" src="https://www.svgrepo.com/show/492789/books-and-people.svg" alt="">
                <p class="text-3xl font-bold text-white">600+</p>
                <p class="text-2xl font-bold text-gray-500 whitespace-nowrap">Different Courses</p>
            </div>
            <div class="w-46 flex flex-col items-center mb-12">
                <img class="w-44 h-44" src="https://www.svgrepo.com/show/520508/student.svg" alt="">
                <p class="text-3xl font-bold text-white">700,000+</p>
                <p class="text-2xl font-bold text-gray-500 whitespace-nowrap">Students Enrolled</p>
            </div>
            <div class="w-46 flex flex-col items-center mb-12">
                <img class="w-44 h-44" src="https://www.svgrepo.com/show/381938/success-achievement-award-medal-winner.svg" alt="">
                <p class="text-3xl font-bold text-white">10,000+</p>
                <p class="text-2xl font-bold text-gray-500 whitespace-nowrap">Successful Transitions</p>
            </div>
        </div>
    </div>
    
</body>
</html>
